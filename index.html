<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<title>FREQ — Walkie Talkie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0d0f;
  --surface:   #141418;
  --surface2:  #1a1a20;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.12);
  --amber:     #f5a623;
  --amber-dim: #7a5010;
  --amber-glow:rgba(245,166,35,0.25);
  --red:       #ff4444;
  --green:     #30d158;
  --blue:      #0a84ff;
  --text:      #e8e8ea;
  --text-dim:  #5a5a6e;
  --text-mid:  #9898aa;
  --r:         16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
}

/* ── Background grid ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ── Screens ─────────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 20px;
  transition: opacity 0.3s, transform 0.3s;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
}

/* ══════════════════════════════════════════════
   JOIN SCREEN
══════════════════════════════════════════════ */
#join-screen {
  gap: 0;
}

.logo-block {
  margin-bottom: 32px;
  text-align: center;
}

.logo {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 12px;
  color: var(--amber);
  text-shadow: 0 0 40px var(--amber-glow), 0 0 80px var(--amber-glow);
  line-height: 1;
}

.logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 6px;
}

.card {
  width: min(360px, 100%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px 24px;
}

.card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* Room input */
.room-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.room-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--amber);
  text-transform: uppercase;
  text-align: center;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.room-input::placeholder {
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 2px;
}

.room-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-glow);
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  padding: 14px 20px;
}

.btn-primary {
  width: 100%;
  background: var(--amber);
  color: #0d0d0f;
  margin-top: 4px;
}

.btn-primary:active { transform: scale(0.97); filter: brightness(0.9); }
.btn-primary:disabled { opacity: 0.4; pointer-events: none; }

.btn-ghost {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-mid);
  padding: 10px 14px;
  font-size: 12px;
  white-space: nowrap;
}

.btn-ghost:active { background: var(--border2); }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text-dim);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.hint {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.7;
  margin-top: 16px;
}

.hint strong { color: var(--text-mid); }

/* ══════════════════════════════════════════════
   WAITING SCREEN
══════════════════════════════════════════════ */
.waiting-room-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--amber);
  text-align: center;
  text-shadow: 0 0 30px var(--amber-glow);
}

.waiting-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 8px;
}

/* Radar animation */
.radar {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto;
}

.radar-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--amber);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: radar-pulse 2s ease-out infinite;
}

.radar-ring:nth-child(1) { width: 40px; height: 40px; animation-delay: 0s; }
.radar-ring:nth-child(2) { width: 80px; height: 80px; animation-delay: 0.5s; }
.radar-ring:nth-child(3) { width: 120px; height: 120px; animation-delay: 1s; }

@keyframes radar-pulse {
  0%   { opacity: 0.8; transform: translate(-50%,-50%) scale(0.3); }
  100% { opacity: 0;   transform: translate(-50%,-50%) scale(1); }
}

.radar-dot {
  position: absolute;
  width: 10px; height: 10px;
  background: var(--amber);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 16px var(--amber);
}

.waiting-msg {
  font-size: 14px;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.7;
}

.share-url {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  text-align: center;
  word-break: break-all;
  width: min(360px, 100%);
  cursor: pointer;
  transition: border-color 0.2s;
}

.share-url:active { border-color: var(--amber); }

.copy-hint {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-top: -12px;
}

.btn-leave {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
}

/* ══════════════════════════════════════════════
   WALKIE SCREEN
══════════════════════════════════════════════ */
#walkie-screen {
  justify-content: space-between;
  padding: 20px 20px 32px;
}

/* Top bar */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.top-logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--amber);
}

.top-room {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text-mid);
}

.top-conn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--green);
  text-transform: uppercase;
}

.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: conn-blink 2s ease-in-out infinite;
}

@keyframes conn-blink {
  0%,100% { opacity:1; } 50% { opacity:0.5; }
}

/* Waveform canvas */
#waveform {
  width: 100%;
  height: 56px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: block;
}

/* Status panel */
.status-panel {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.status-key {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.status-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text);
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}

.badge-green  { background: rgba(48,209,88,0.15);  color: var(--green); }
.badge-amber  { background: rgba(245,166,35,0.15); color: var(--amber); }
.badge-red    { background: rgba(255,68,68,0.15);  color: var(--red);   }
.badge-blue   { background: rgba(10,132,255,0.15); color: var(--blue);  }

/* ── PTT Zone ─────────────── */
.ptt-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
}

/* Big PTT button */
.ptt-outer {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Halo rings */
.ptt-halo {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid var(--amber-dim);
  transition: border-color 0.15s;
}

.ptt-halo::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px solid rgba(245,166,35,0.08);
}

.ptt-btn {
  position: relative;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  box-shadow:
    0 0 0 2px var(--border2),
    0 8px 32px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.1s ease;
  user-select: none;
  -webkit-user-select: none;
}

.ptt-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.ptt-mic {
  font-size: 40px;
  filter: grayscale(1) brightness(0.5);
  transition: filter 0.12s;
  line-height: 1;
}

.ptt-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--text-dim);
  text-transform: uppercase;
  transition: color 0.12s;
}

/* TX active */
.ptt-btn.tx-active {
  background: rgba(245,166,35,0.08);
  box-shadow:
    0 0 0 2px var(--amber),
    0 0 40px var(--amber-glow),
    0 0 80px var(--amber-glow),
    inset 0 2px 8px rgba(0,0,0,0.4);
  transform: scale(0.96);
}

.ptt-btn.tx-active .ptt-halo { border-color: var(--amber); }
.ptt-btn.tx-active .ptt-mic { filter: grayscale(0) brightness(1); }
.ptt-btn.tx-active .ptt-label { color: var(--amber); }

/* RX active glow */
.ptt-btn.rx-active {
  box-shadow:
    0 0 0 2px var(--blue),
    0 0 30px rgba(10,132,255,0.2),
    0 8px 32px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* Indicators row */
.indicators {
  display: flex;
  gap: 24px;
  align-items: center;
}

.ind {
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.25;
  transition: opacity 0.15s;
}

.ind.on { opacity: 1; }

.ind-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.ind-dot.tx { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.ind-dot.rx { background: var(--blue);  box-shadow: 0 0 8px var(--blue); }

.ind-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text-mid);
}

.ind.on .ind-label { color: var(--amber); }
.ind.on.rx-ind .ind-label { color: var(--blue); }

/* ── TX pulse animation ──── */
@keyframes tx-pulse {
  0%,100% { box-shadow: 0 0 0 2px var(--amber), 0 0 40px var(--amber-glow), 0 0 80px var(--amber-glow), inset 0 2px 8px rgba(0,0,0,0.4); }
  50%     { box-shadow: 0 0 0 2px var(--amber), 0 0 60px rgba(245,166,35,0.4), 0 0 100px rgba(245,166,35,0.2), inset 0 2px 8px rgba(0,0,0,0.4); }
}

.ptt-btn.tx-active { animation: tx-pulse 1s ease-in-out infinite; }

/* Bottom leave btn */
.leave-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  transition: border-color 0.15s, color 0.15s;
}

.leave-btn:active { border-color: var(--red); color: var(--red); }

/* ── Error toast ─────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #2a1010;
  border: 1px solid var(--red);
  color: var(--red);
  font-size: 13px;
  letter-spacing: 1px;
  padding: 12px 20px;
  border-radius: 10px;
  transition: transform 0.3s;
  z-index: 999;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}

#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     PANTALLA 1 — JOIN
══════════════════════════════════════════ -->
<div class="screen" id="join-screen">
  <div class="logo-block">
    <div class="logo">FREQ</div>
    <div class="logo-sub">Walkie Talkie · WebRTC</div>
  </div>

  <div class="card">
    <div class="card-title">Canal de comunicación</div>

    <div class="room-row">
      <input
        class="room-input"
        id="room-input"
        type="text"
        maxlength="6"
        placeholder="ABC123"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>

    <button class="btn btn-primary" id="join-btn" onclick="joinRoom()">
      Conectar al canal
    </button>

    <div class="divider">o</div>

    <button class="btn btn-ghost" style="width:100%" onclick="createRoom()">
      ⚡ Crear canal nuevo
    </button>
  </div>

  <div class="hint">
    Comparte el código de canal con la otra persona.<br>
    <strong>Funciona desde cualquier red.</strong>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PANTALLA 2 — WAITING
══════════════════════════════════════════ -->
<div class="screen hidden" id="waiting-screen">
  <div class="waiting-label">Canal activo</div>
  <div class="waiting-room-badge" id="waiting-room-id">—</div>

  <div class="radar">
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-dot"></div>
  </div>

  <div class="waiting-msg">
    Esperando al segundo dispositivo…<br>
    Comparte este enlace:
  </div>

  <div class="share-url" id="share-url" onclick="copyLink()">—</div>
  <div class="copy-hint">Toca para copiar</div>

  <button class="btn-leave" onclick="leaveRoom()">Cancelar</button>
</div>

<!-- ══════════════════════════════════════════
     PANTALLA 3 — WALKIE
══════════════════════════════════════════ -->
<div class="screen hidden" id="walkie-screen">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-logo">FREQ</div>
    <div class="top-room" id="top-room-id">—</div>
    <div class="top-conn">
      <div class="conn-dot"></div>
      <span>En línea</span>
    </div>
  </div>

  <!-- Waveform -->
  <canvas id="waveform" width="600" height="56"></canvas>

  <!-- Status -->
  <div class="status-panel">
    <div class="status-row">
      <span class="status-key">Estado</span>
      <span class="badge badge-green" id="st-estado">Conectado</span>
    </div>
    <div class="status-row">
      <span class="status-key">Rol</span>
      <span class="status-val" id="st-rol">—</span>
    </div>
    <div class="status-row">
      <span class="status-key">Latencia</span>
      <span class="status-val" id="st-latencia">—</span>
    </div>
    <div class="status-row">
      <span class="status-key">Ruta</span>
      <span class="badge" id="st-ruta">—</span>
    </div>
  </div>

  <!-- PTT -->
  <div class="ptt-zone">
    <div class="ptt-outer">
      <div class="ptt-halo" id="ptt-halo"></div>
      <button class="ptt-btn" id="ptt-btn" disabled
        ontouchstart="pttDown(event)"
        ontouchend="pttUp(event)"
        ontouchcancel="pttUp(event)"
        onmousedown="pttDown(event)"
        onmouseup="pttUp(event)"
        onmouseleave="pttUp(event)">
        <span class="ptt-mic">🎙️</span>
        <span class="ptt-label">Pulsa</span>
      </button>
    </div>

    <div class="indicators">
      <div class="ind" id="tx-ind">
        <div class="ind-dot tx"></div>
        <span class="ind-label">TX</span>
      </div>
      <div class="ind rx-ind" id="rx-ind">
        <div class="ind-dot rx"></div>
        <span class="ind-label">RX</span>
      </div>
    </div>
  </div>

  <button class="leave-btn" onclick="leaveRoom()">Salir del canal</button>
</div>

<!-- Toast de error -->
<div id="toast"></div>
<audio id="remote-audio" autoplay playsinline></audio>

<script>
// ═══════════════════════════════════════════════
//  FREQ — Walkie-Talkie Internet
//  WebRTC + WebSocket Signaling
// ═══════════════════════════════════════════════

// ── Detectar URL del servidor ─────────────────
// En producción (Railway/Render) el servidor sirve
// tanto el HTML como el WebSocket en el mismo dominio.
const WS_PROTO  = location.protocol === 'https:' ? 'wss:' : 'ws:';
const SERVER    = `${WS_PROTO}//${location.host}`;

// ── ICE config: STUN público + TURN gratuito ──
// Open Relay Project (metered.ca) — 20 GB/mes gratis
const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: 'turn:standard.relay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:standard.relay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turns:standard.relay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

// ── Estado global ─────────────────────────────
let ws         = null;
let pc         = null;
let localStream= null;
let sender     = null;
let role       = null;
let roomId     = null;
let isTx       = false;
let audioCtx   = null;
let analyser   = null;
let rafId      = null;
let statsTimer = null;

// ── DOM ───────────────────────────────────────
const screens   = { join: $('join-screen'), waiting: $('waiting-screen'), walkie: $('walkie-screen') };
const roomInput = $('room-input');
const pttBtn    = $('ptt-btn');
const txInd     = $('tx-ind');
const rxInd     = $('rx-ind');
const remoteAudio = $('remote-audio');
const wfCanvas  = $('waveform');
const wfCtx     = wfCanvas.getContext('2d');

function $(id) { return document.getElementById(id); }

// ── URL params: unirse con link directo ───────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const r = params.get('room');
  if (r) {
    roomInput.value = r.toUpperCase();
    // Auto-join si viene por link
    setTimeout(() => joinRoom(), 300);
  }
  roomInput.addEventListener('input', () => {
    roomInput.value = roomInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });
});

// ═══════════════════════════════════════════════
//  NAVEGACIÓN ENTRE PANTALLAS
// ═══════════════════════════════════════════════
function showScreen(name) {
  for (const [k, el] of Object.entries(screens)) {
    el.classList.toggle('hidden', k !== name);
  }
}

// ═══════════════════════════════════════════════
//  ROOM MANAGEMENT
// ═══════════════════════════════════════════════
function createRoom() {
  const id = Math.random().toString(36).slice(2,8).toUpperCase();
  roomInput.value = id;
  joinRoom();
}

function joinRoom() {
  const id = roomInput.value.trim().toUpperCase();
  if (!id || id.length < 3) { showToast('Introduce un código de canal (mín. 3 letras)'); return; }
  roomId = id;
  connectWS(roomId);
}

function leaveRoom() {
  cleanup();
  showScreen('join');
  roomInput.value = '';
  history.replaceState({}, '', location.pathname);
}

function copyLink() {
  const url = $('share-url').textContent;
  navigator.clipboard?.writeText(url).then(() => showToast('¡Enlace copiado!'));
}

// ═══════════════════════════════════════════════
//  WEBSOCKET — SEÑALIZACIÓN
// ═══════════════════════════════════════════════
function connectWS(room) {
  const url = `${SERVER}/room/${room}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    console.log('WS conectado');
  };

  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    await handleMsg(msg);
  };

  ws.onerror = () => showToast('Error de conexión con el servidor');

  ws.onclose = () => {
    if (screens.walkie.classList.contains('hidden') === false) {
      showToast('Conexión perdida. Recargando…');
      setTimeout(leaveRoom, 2000);
    }
  };
}

async function handleMsg(msg) {
  switch (msg.type) {

    case 'welcome':
      role = msg.role;
      $('waiting-room-id').textContent = msg.roomId;
      const shareLink = `${location.origin}${location.pathname}?room=${msg.roomId}`;
      $('share-url').textContent = shareLink;
      history.replaceState({}, '', `?room=${msg.roomId}`);
      showScreen('waiting');
      break;

    case 'peer-ready':
      await initWebRTC();
      if (role === 'initiator') await sendOffer();
      break;

    case 'offer':
      await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      signal({ type: 'answer', sdp: pc.localDescription.sdp });
      break;

    case 'answer':
      await pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp });
      break;

    case 'ice-candidate':
      if (msg.candidate) {
        try { await pc.addIceCandidate(msg.candidate); } catch(e) {}
      }
      break;

    case 'peer-disconnected':
      showToast('El otro dispositivo se desconectó');
      setStatus('Desconectado', 'red');
      pttBtn.disabled = true;
      setTimeout(leaveRoom, 2500);
      break;

    case 'error':
      showToast(msg.message);
      setTimeout(leaveRoom, 2000);
      break;
  }
}

function signal(msg) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ═══════════════════════════════════════════════
//  WEBRTC
// ═══════════════════════════════════════════════
async function initWebRTC() {
  pc = new RTCPeerConnection(ICE_CONFIG);

  pc.onicecandidate = ({ candidate }) => {
    signal({ type: 'ice-candidate', candidate });
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    console.log('WebRTC:', s);

    if (s === 'connected') {
      $('top-room-id').textContent = roomId;
      $('st-rol').textContent = role === 'initiator' ? 'Primario' : 'Secundario';
      pttBtn.disabled = false;
      showScreen('walkie');
      startStatsPolling();
    }

    if (s === 'failed' || s === 'disconnected') {
      setStatus('Error de enlace', 'red');
      pttBtn.disabled = true;
    }
  };

  pc.ontrack = ({ streams }) => {
    remoteAudio.srcObject = streams[0];
    setRX(true);
    // Quitar RX cuando el stream de audio se quede en silencio
    streams[0].getAudioTracks()[0]?.addEventListener('ended', () => setRX(false));
  };
}

async function sendOffer() {
  const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
  await pc.setLocalDescription(offer);
  signal({ type: 'offer', sdp: pc.localDescription.sdp });
}

// ═══════════════════════════════════════════════
//  PUSH-TO-TALK
// ═══════════════════════════════════════════════
async function pttDown(e) {
  e.preventDefault();
  if (!pc || isTx || pttBtn.disabled) return;
  isTx = true;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        sampleRate: 16000,
        channelCount: 1
      }
    });

    localStream.getAudioTracks().forEach(t => {
      sender = pc.addTrack(t, localStream);
    });

    startWaveform(localStream);
    pttBtn.classList.add('tx-active');
    txInd.classList.add('on');

  } catch (err) {
    isTx = false;
    showToast('Sin acceso al micrófono: ' + err.name);
  }
}

function pttUp(e) {
  e.preventDefault();
  if (!isTx) return;
  isTx = false;

  if (sender && pc) { try { pc.removeTrack(sender); } catch(e) {} sender = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }

  stopWaveform();
  pttBtn.classList.remove('tx-active');
  txInd.classList.remove('on');
}

// ═══════════════════════════════════════════════
//  WAVEFORM VISUALIZER
// ═══════════════════════════════════════════════
function startWaveform(stream) {
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} }
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);

  const buf = new Uint8Array(analyser.frequencyBinCount);
  const W = wfCanvas.width, H = wfCanvas.height;
  const barCount = 48;
  const barW = W / barCount;

  function frame() {
    rafId = requestAnimationFrame(frame);
    analyser.getByteFrequencyData(buf);
    wfCtx.clearRect(0, 0, W, H);

    for (let i = 0; i < barCount; i++) {
      const idx = Math.floor(i * buf.length / barCount);
      const v = buf[idx] / 255;
      const h = Math.max(3, v * H);
      const alpha = 0.4 + v * 0.6;
      wfCtx.fillStyle = `rgba(245,166,35,${alpha})`;
      wfCtx.beginPath();
      wfCtx.roundRect(i * barW + 1, (H - h) / 2, barW - 2, h, 2);
      wfCtx.fill();
    }
  }
  frame();
}

function stopWaveform() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  wfCtx.clearRect(0, 0, wfCanvas.width, wfCanvas.height);
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
}

// ═══════════════════════════════════════════════
//  STATS (latencia + ruta)
// ═══════════════════════════════════════════════
function startStatsPolling() {
  statsTimer = setInterval(async () => {
    if (!pc) return;
    try {
      const stats = await pc.getStats();
      for (const [, s] of stats) {
        if (s.type === 'candidate-pair' && s.state === 'succeeded') {
          const rtt = s.currentRoundTripTime;
          if (rtt != null) {
            $('st-latencia').textContent = Math.round(rtt * 1000) + ' ms';
          }
        }
        if (s.type === 'remote-candidate') {
          const isRelay = s.candidateType === 'relay';
          const routeEl = $('st-ruta');
          routeEl.textContent = isRelay ? 'TURN (relay)' : 'P2P directo';
          routeEl.className = 'badge ' + (isRelay ? 'badge-amber' : 'badge-green');
        }
      }
    } catch(e) {}
  }, 2000);
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function setStatus(text, color) {
  const el = $('st-estado');
  el.textContent = text;
  el.className = `badge badge-${color}`;
}

function setRX(on) {
  rxInd.classList.toggle('on', on);
  pttBtn.classList.toggle('rx-active', on);
}

let toastTimer = null;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function cleanup() {
  clearInterval(statsTimer);
  stopWaveform();
  if (sender && pc) { try { pc.removeTrack(sender); } catch(e) {} sender = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { try { pc.close(); } catch(e) {} pc = null; }
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
  isTx = false;
  role = null;
  roomId = null;
  setRX(false);
  pttBtn.classList.remove('tx-active', 'rx-active');
  txInd.classList.remove('on');
}
</script>
